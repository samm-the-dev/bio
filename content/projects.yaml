projects:
  - name: Ohm
    slug: ohm
    category: web-app
    descUpdated: "2026-03-16"
    description: |
      A [personal kanban](https://personalkanban.com/learn/personal-kanban/) app developed using ADHD research.

      I have some ideas for turning this into a coordinator for various specific task/habit apps.
      Let me know if you're using it and/or interested in testing the larger ecosystem of apps I have in mind.

      > PWA with offline support built on React 19 and Vite.
      >
      > - dnd-kit for drag-and-drop card management
      > - localStorage with optional Google Drive sync via GCP Cloud Functions
      > - ADHD-informed UX: energy capacity limits, 14-day aging indicators, completion rewards, and a welcome-back summary after time away
    tech: [PWA, React 19, TypeScript, Vite, Tailwind CSS, Google Drive API, GCP Cloud Functions]
    link: https://apps.samm-the.dev/ohm
    repo: https://github.com/samm-the-dev/ohm

  - name: Build-a-Jam
    slug: build-a-jam
    category: web-app
    descUpdated: "2026-03-16"
    description: |
      A tool for selecting improv warm-ups and exercises based on tags like 'connection', 'structure', 'heightening', and more.

      > PWA built with React 19, shadcn/ui, and dnd-kit.
      >
      > - ~300+ exercises scraped from learnimprov.com and improwiki.com
      > - Session queue with configurable timers and post-session notes
      > - Favorites, session history, and custom exercise creation
    tech: [PWA, React 19, TypeScript, Vite, Tailwind CSS]
    link: https://build-a-jam.app/
    repo: https://github.com/samm-the-dev/build-a-jam

  - name: The Enchiridion
    slug: the-enchiridion
    category: web-app
    descUpdated: "2026-03-16"
    description: |
      An Adventure Time catalog and episode guide.

      AT is one of my favorite things on the planet, and for a while now I've wanted to build a proper episode guide.
      This project is meant to replace the fandom wiki (which is messy and rife with ads),
      and improve on it with transcript searching and other features.

      Stay tuned...

      > React 19 SPA with 8 character-themed color schemes via CSS variables.
      >
      > - Full-text transcript search (powered by the Adventure Time Transcripts pipeline)
      > - Structured episode metadata and guide
      > - Automated a11y auditing via Playwright and axe-core
    tech: [React 19, TypeScript, Vite, Tailwind CSS, Playwright, axe-core]
    link: null
    repo: https://github.com/samm-the-dev/the-enchiridion

  - name: Clip Forge
    slug: clip-forge
    category: code
    descUpdated: "2026-03-16"
    description: |
      I'm a big reaction GIF guy.
      I used to have moments in online/text conversations where I'd want to react with a specific moment for a show,
      but I'd either be unable to find a GIF of it or what I would find would be low quality.

      Now I make my own, and I've refined my process over the last year or two into an AI-assisted partially automated pipeline.
      Check out my [GIFs](/gifs) page to see everything I've made.

      > Python CLI pipeline for extracting movie/show moments into subtitle-burned animated WebPs.
      >
      > - Parses clip notes, extracts and caches subtitles via FFmpeg
      > - Fuzzy-searches dialogue to find timestamps, rough-cuts with configurable padding
      > - Imports into DaVinci Resolve via scripting API with subtitle tracks and WebP render settings preconfigured
      > - OBS WebSocket integration for interactive capture from streaming services
    tech: [Python, FFmpeg, DaVinci Resolve Scripting API]
    link: null
    repo: https://github.com/samm-the-dev/clip-forge

  - name: Adventure Time Transcripts
    slug: adventure-time-transcripts
    category: code
    descUpdated: "2026-03-16"
    description: |
      This was based on a repository of transcripts that I believe was scraped from the fan wiki.
      I wanted to fill out the catalog of transcripts, get them into a consistent format, and use them for The Enchiridion.

      This is easily the most technically complex solo project I've done, and I'm still working on it.
      Once it's done, I plan to make it generic for use with any show.

      > Speaker diarization pipeline using whisperX with GPU acceleration, ECAPA-TDNN voice embeddings, and OpenAI Vision API for speaker identification.
      >
      > - Processes 315 episodes across main series, Distant Lands, and Fionna and Cake
      > - Fills gaps from SRT/SDH subtitles and Blu-ray PGS bitmap OCR via Tesseract
      > - Runs in Docker with optional CUDA support
    tech: [Python, Claude Vision API, ffmpeg, Docker, CUDA]
    link: null
    repo: https://github.com/samm-the-dev/adventuretime-transcripts

  - name: Toolbox
    slug: toolbox
    category: code
    descUpdated: "2026-03-16"
    description: |
      A repository of tooling that's generally useful across three or more of my projects.

      > Git submodule (`.toolbox/`) shared across all projects.
      >
      > - Cross-tool AI context files (AGENTS.md, CLAUDE.md) and Copilot instructions
      > - Claude Code hooks: guardrails, session lifecycle, desktop notifications
      > - Reusable GitHub Actions workflow for Claude Code (on-demand review, adversarial auto-review, Copilot response)
      > - Google Drive sync libraries and GCP OAuth helpers
      > - Share utility with Web Share API and clipboard fallback
    tech: [Claude AI, Google OAuth, GCP Cloud Functions, React, Vite, TypeScript, GitHub Actions]
    link: null
    repo: https://github.com/samm-the-dev/toolbox

