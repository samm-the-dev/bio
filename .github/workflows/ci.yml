# CI workflow for Node.js projects
# Runs lint, tests, and build on PRs and main branch pushes

name: CI

on:
  pull_request:
    branches: ['*']
    paths-ignore:
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.vscode/**'

  push:
    branches: ['main']

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch content
        run: npm run content

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Accessibility audit
        run: npm run audit:a11y

      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-audit-report
          path: axe-audit.json
          if-no-files-found: ignore
