# On-demand @claude mentions, adversarial PR review, and Copilot response.
# Powered by the shared reusable workflow in toolbox.

name: Claude Code

on:
  # On-demand: @claude mentions
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, assigned]

  # Adversarial review: non-draft PR open/update
  pull_request:
    types: [opened, synchronize, reopened]

  # Copilot response: when Copilot submits a review
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    uses: samm-the-dev/toolbox/.github/workflows/claude.yml@main
    with:
      mode: "all"
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
